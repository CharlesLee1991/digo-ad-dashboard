name: guard

on:
  push:
    branches: [main]
  pull_request:

jobs:
  security-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. .env 커밋 차단 (.env.example 은 허용)
      - name: Block committed .env
        run: |
          if git ls-files | grep -E '(^|/)\.env$'; then
            echo "::error::.env is committed. Remove it (git rm --cached) and add .env to .gitignore."
            exit 1
          fi
          echo "OK: no .env tracked."

      # 2. 고위험 시크릿 패턴 스캔 (lock/바이너리 제외, JWT는 오탐 많아 제외)
      - name: Scan high-risk secrets
        run: |
          PATTERN='ghp_[A-Za-z0-9]{20,}|ghs_[A-Za-z0-9]{20,}|sk-proj-[A-Za-z0-9_-]{20,}|sk-ant-api[0-9]{2}-[A-Za-z0-9_-]{20,}|xox[bp]-[A-Za-z0-9-]{10,}|AKIA[0-9A-Z]{16}'
          if git grep -nIE "$PATTERN" -- \
              ':!*.lock' ':!*.lockb' ':!package-lock.json' ':!bun.lock' \
              ':!*.png' ':!*.jpg' ':!*.svg'; then
            echo "::error::Hardcoded secret pattern detected. Move it to a secrets table or Actions secret."
            exit 1
          fi
          echo "OK: no high-risk secret patterns."

      # 3. CLAUDE.md 존재 (STD-GITHUB-CONTEXT-LAYER)
      - name: Require CLAUDE.md
        run: |
          test -f CLAUDE.md || { echo "::error::CLAUDE.md missing (STD-GITHUB-CONTEXT-LAYER v1.1)."; exit 1; }
          echo "OK: CLAUDE.md present."
