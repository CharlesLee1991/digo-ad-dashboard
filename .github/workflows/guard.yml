name: guard

on:
  push:
    branches: [main]
  pull_request:

jobs:
  security-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. .env 안의 고위험 키만 차단 (VITE_ anon/publishable 공개키는 허용 — Lovable 호환)
      - name: Guard .env contents
        run: |
          bad=0
          for f in $(git ls-files | grep -E '(^|/)\.env(\.[a-zA-Z0-9]+)?$' | grep -vE 'example|sample'); do
            if grep -qiE 'service_role|service_key|secret_key|private_key|sk-proj-|sk-ant-api|ghp_[A-Za-z0-9]{20}|AKIA[0-9A-Z]{16}' "$f"; then
              echo "::error::$f has a high-risk secret (service_role/API key). Use a secret store, not .env."
              bad=1
            fi
          done
          [ "$bad" = "1" ] && exit 1
          echo "OK: .env files contain no high-risk secrets (public VITE_ keys allowed)."

      # 2. 고위험 시크릿 패턴 스캔 (lock/바이너리 제외, JWT는 오탐 많아 제외)
      - name: Scan high-risk secrets
        run: |
          PATTERN='ghp_[A-Za-z0-9]{20,}|ghs_[A-Za-z0-9]{20,}|sk-proj-[A-Za-z0-9_-]{20,}|sk-ant-api[0-9]{2}-[A-Za-z0-9_-]{20,}|xox[bp]-[A-Za-z0-9-]{10,}|AKIA[0-9A-Z]{16}'
          if git grep -nIE "$PATTERN" -- \
              ':!*.lock' ':!*.lockb' ':!package-lock.json' ':!bun.lock' \
              ':!*.png' ':!*.jpg' ':!*.svg'; then
            echo "::error::Hardcoded secret pattern detected. Move it to a secrets table or Actions secret."
            exit 1
          fi
          echo "OK: no high-risk secret patterns."

      # 3. Agent guide 존재 (CLAUDE.md 또는 AGENTS.md)
      - name: Require agent guide
        run: |
          if [ -f CLAUDE.md ] || [ -f AGENTS.md ]; then
            echo "OK: agent guide present."
          else
            echo "::error::CLAUDE.md or AGENTS.md missing (STD-GITHUB-CONTEXT-LAYER v1.1)."
            exit 1
          fi
